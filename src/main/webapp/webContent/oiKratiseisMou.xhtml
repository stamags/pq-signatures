<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:a4j="http://primefaces.org/ui"
                template="../WEB-INF/template.xhtml">

    <ui:define name="title">ΚΕΠΥΕΣ</ui:define>
    <ui:define name="header">
        <meta http-equiv="refresh" content="#{session.maxInactiveInterval};url=login.xhtml"/>
    </ui:define><!--  #{request.contextPath}/  -->
    <!-- <ui:define name="topMenu"><ui:include src="/menus/topMenu.xhtml"></ui:include></ui:define> -->
    <ui:define name="content">

        <div class="warning">
            Οι κρατήσεις που έχουν ολοκληρωθεί εμφανίζονται με ερυθρό χρώμα!
        </div>

        <p:panel header="Οι Κρατήσεις Μου">

            <style type="text/css">
                .false {
                    background-color: #f9bbbc !important;
                    background-image: none !important;
                    color: #000000 !important;
                }
            </style>


            <br/>

            <h:form id="form">
                <p:growl id="msgs1" showDetail="true" life="3000"/>
                <p:outputPanel id="stoixeia" style="width: 100%">
                    <p:dataTable id="oiKratiseisMouTable"
                                 value="#{OiKratiseisMouBean.parkingBookingList}"
                                 var="record"
                                 rowIndexVar="it"
                                 filterEvent="enter"
                                 paginator="true"
                                 rows="10"
                                 styleClass="aligncenter"
                                 editable="false"
                                 widgetVar="oiKratiseisMouTable"
                                 rowKey="#{record}"
                                 scrollable="true"
                                 paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
                                 currentPageReportTemplate="Βρέθηκαν {totalRecords} Κρατήσεις!"
                                 rowStyleClass="#{OiKratiseisMouBean.parkingBookingList.get(it).hasArrived ne true ? null: 'false'}">

                        <f:facet name="{Exporters}">
                            <p:commandButton value="Εξαγωγή Αποτελεσμάτων" icon="ui-icon-document" ajax="false"
                                             style="margin-left: 30px">
                                <p:dataExporter type="xls" target="oiKratiseisMouTable" fileName="oiKratiseisMou"/>
                            </p:commandButton>
                        </f:facet>


                        <p:column headerText="Α/Α" style="width: 60px!important;">
                            <h:outputText value="#{it+1}"/>
                        </p:column>

                        <!--<p:aj   ax event="rowEdit" listener="#{EmployeesBean.onRowEdit}" update=":form:msgs1"/>-->
                        <!--<p:ajax event="rowEditCancel" listener="#{EmployeesBean.onRowCancel}" update=":form:msgs1"/>-->

                        <p:column headerText="Από:" sortBy="#{record.startTime }"
                                  filterBy="#{record.startTime}"
                                  filterMatchMode="contains"
                                  style="width: 100px"
                                  exportable="true">
                            <h:outputText
                                    value="#{record.startTime}">
                                <f:convertDateTime pattern="dd-MM-yyyy"/>
                            </h:outputText>
                        </p:column>

                        <p:column headerText="Ώρα:" sortBy="#{record.startTime }"
                                  filterBy="#{record.startTime}"
                                  filterMatchMode="contains"
                                  style="width: 100px"
                                  exportable="true">
                            <h:outputText
                                    value="#{record.startTime}">
                                <f:convertDateTime pattern="HH:mm:ss"/>
                            </h:outputText>
                        </p:column>

                        <!--                            <p:commandLink id="test11" value="#{record.startTime}"-->
                        <!--                                           ajax="false"-->
                        <!--                                           action="#{basikaEfedrosBean.selectEfedros(record.kenStratevmenos)}">-->
                        <!--                            </p:commandLink>-->


                        <p:column headerText="Έως:" sortBy="#{record.endTime}"
                                  filterBy="#{record.endTime}"
                                  filterMatchMode="contains"
                                  style="width: 100px;height: auto">
                            <h:outputText
                                    value="#{record.endTime}">
                                <f:convertDateTime pattern="dd-MM-yyyy"/>
                            </h:outputText>
                        </p:column>

                        <p:column headerText="Ώρα:" sortBy="#{record.endTime}"
                                  filterBy="#{record.endTime}"
                                  filterMatchMode="contains"
                                  style="width: 100px;height: auto">
                            <h:outputText
                                    value="#{record.endTime}">
                                <f:convertDateTime pattern="HH:mm:ss"/>
                            </h:outputText>
                        </p:column>

                        <p:column headerText="Όροφος" sortBy="#{record.slotId.floorId.floorName}"
                                  filterBy="#{record.slotId.floorId.floorName}"
                                  filterMatchMode="contains"
                                  style="width: 100px;height: auto">
                            <h:outputText
                                    value="#{record.slotId.floorId.floorName}"/>
                        </p:column>

                        <p:column headerText="Θέση" sortBy="#{record.slotId.slotNumber }"
                                  filterBy="#{record.slotId.slotNumber }"
                                  filterMatchMode="contains"
                                  style="width: 100px">
                            <h:outputText
                                    value="#{record.slotId.slotNumber }"/>
                        </p:column>


                        <p:column headerText="Έχει Ολοκληρωθεί"
                                  filterBy="#{record.hasArrived}"
                                  filterMatchMode="equals"
                                  style="width: 100px;height: auto">
                            <f:facet name="filter">
                                <p:selectOneMenu onchange="PF('oiKratiseisMouTable').filter()"
                                                 styleClass="ui-selectcheckboxmenu-items">
                                    <f:converter converterId="javax.faces.Boolean"/>
                                    <f:selectItem itemLabel="ΌΛΕΣ" itemValue=""/>
                                    <f:selectItem itemLabel="ΝΑΙ" itemValue="true"/>
                                    <f:selectItem itemLabel="ΟΧΙ" itemValue="false"/>
                                </p:selectOneMenu>
                            </f:facet>
                            <h:outputText
                                    value="#{record.hasArrived? 'ΝΑΙ' : 'ΟΧΙ' }"/>
                        </p:column>


                        <p:column  headerText="Ακύρωση Κράτησης" style="width: 100px;height: auto">
                            <p:commandLink action="#{OiKratiseisMouBean.deleteKratisi(record)}"
                                           update="form:oiKratiseisMouTable  form:msgs1">
                                <h:graphicImage name="/icons/delete.png"
                                                title="Ακύρωση"/>
                            </p:commandLink>
                        </p:column>


                    </p:dataTable>
                </p:outputPanel>
            </h:form>
        </p:panel>


    </ui:define>


    <!--Είναι για το security για να βλέπουμε αν έχει πρόσβαση στην σελίδα ή όχι-->
<!--    <f:metadata>-->
<!--        <f:event type="preRenderView" listener="#{LoginBean.redirect('employees')}"/>-->
<!--    </f:metadata>-->

</ui:composition>
