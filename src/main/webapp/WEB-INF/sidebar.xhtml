<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:f="jakarta.faces.core"
        xmlns:h="jakarta.faces.html"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:p="http://primefaces.org/ui"
        xmlns:pm="http://primefaces.org/manhattan">


    <f:metadata>
        <f:event type="preRenderView" listener="#{guestPreferences.setTheme(LoginBean.user.theme)}"/>
    </f:metadata>


    <div class="layout-sidebar">
        <div class="layout-sidebar-logo">

            <a href="missionstimeline.xhtml">
<!--                <p:graphicImage name="images/landing/icon-cleancode.svg" library="manhattan-layout"/>-->
                <p:graphicImage name="css/images/background2.jpg" library="assets_aerial" />

                <!--                <p:graphicImage name="images/pearl-rail.png" library="manhattan-layout" />-->
                <!--                <p:graphicImage name="images/bg.png" library="manhattan-layout"/>-->
            </a>
            <a href="#" id="layout-sidebar-anchor" class="layout-sidebar-anchor" title="Toggle Menu">
<!--                <i class="fa"></i>-->
                <i class="fa fa-bars"></i>
            </a>
        </div>


        <div class="nano">
            <div class="nano-content sidebar-scroll-content">
                <div class="layout-menu-container">
                    <h:form id="menuform">
                        <pm:menu>

                            <p:submenu id="diaxeirisiIpografwn" label="Διαχείριση Υπογραφών" expanded="true"
                                       icon="fa fa-pencil-square-o">


                                <p:menuitem id="uploadArxeiou"
                                             value="Μεταφόρτωση και Υπογραφή"
                                             escape="false"
                                             icon="fa fa-upload"
                                             outcome="/webContent/uploadsign"
                                             rendered="#{LoginBean.security.foundPageAccess('uploadsign')}" />

                                <p:menuitem id="verifyArxeiou"
                                            value="Επαλήθευση/Αποστολή Email"
                                            icon="fa fa-envelope"
                                            style="text-overflow: revert"
                                            styleClass="wrapItem"
                                            outcome="/webContent/verify"
                                            rendered="#{LoginBean.security.foundPageAccess('verify')}"/>

                                <p:menuitem id="auditArxeiou" value="Ιστορικό Ενεργειών" icon="fa fa-history"
                                            outcome="/webContent/audit"
                                            rendered="#{LoginBean.security.foundPageAccess('verify')}"/>

                                <p:menuitem id="dashboard" value="Dashboard / Στατιστικά" icon="fa fa-bar-chart"
                                            outcome="/webContent/dashboard"
                                            rendered="#{LoginBean.security.foundPageAccess('dashboard') or LoginBean.isAdmin()}"/>

                            </p:submenu>






                            <p:submenu id="olesOiKratiseis" label="Διαχειριστικό Μενού" icon="fa fa-fw fa-arrow-circle-down"  rendered="#{LoginBean.isAdmin()}">
                                <p:menuitem id="sync16" value="Οι κρατήσεις του Parking"  rendered="#{LoginBean.isAdmin()}"
                                            outcome="/webContent/olesOiKratiseis.jsf?faces-redirect=true"
                                            icon="fa fa-car"/>
                                <p:menuitem id="oloiOiXristes" value="Όλοι οι χρήστες"  rendered="#{LoginBean.isAdmin()}"
                                            outcome="/webContent/oloiOiXristes.jsf?faces-redirect=true"
                                            icon="fa fa-fw fa-users"/>
                            </p:submenu>




                        </pm:menu>

                    </h:form>
                </div>
            </div>
        </div>



    </div>

</ui:composition>
