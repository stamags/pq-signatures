<!DOCTYPE html>
<html lang="en"
      xmlns:h="http://java.sun.com/jsf/html">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Error</title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            background: url("../resources/assets_aerial/css/images/background3.jpg") no-repeat center center fixed;
            background-size: cover;
            position: relative;
            overflow: hidden;
        }

        .overlay {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .error-box {
            width: 430px;
            max-width: 90%;
            padding: 35px 30px;
            text-align: center;
            color: #ffffff;
            background: rgba(20, 25, 40, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        }

        .icon {
            font-size: 44px;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 32px;
            font-weight: 700;
        }

        p {
            margin: 0 0 24px 0;
            font-size: 18px;
            line-height: 1.5;
            color: #e6e6e6;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 24px;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s ease-in-out;
            border: none;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
        }

        .footer {
            position: fixed;
            bottom: 14px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.75);
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="overlay">
    <div class="error-box">
        <div class="icon">⚠</div>
        <h1>An unexpected error occurred.</h1>
        <p>Please try again later.</p>
        <h:commandLink value="Back to Login" action="#{loginBean.aposindesiUser()}" styleClass="btn" />
    </div>
</div>

<div class="footer">
    © 2026
</div>
</body>
</html>
